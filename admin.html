<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel: SEO Submissions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .modal-backdrop { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="text-gray-800">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                    Admin Panel Login
                </h2>
            </div>
            <form id="login-form" class="mt-8 space-y-6">
                <div class="rounded-md shadow-sm -space-y-px">
                    <div>
                        <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Email address">
                    </div>
                    <div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" placeholder="Password">
                    </div>
                </div>
                <p id="login-error" class="text-red-500 text-sm"></p>
                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Sign in
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Main Admin Content (Hidden by default) -->
    <div id="admin-content" class="hidden container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <header class="flex justify-between items-center mb-10">
            <div class="text-left">
                 <h1 class="text-4xl font-bold text-gray-900">Content Management Panel</h1>
                 <p class="mt-2 text-lg text-gray-600">Manage pending and live specialist profiles.</p>
            </div>
            <button id="logout-btn" class="px-4 py-2 bg-red-600 text-white font-semibold rounded-md hover:bg-red-700">Logout</button>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section id="pending-submissions">
                <h2 class="text-2xl font-semibold mb-6 text-gray-800 border-b pb-2">Pending Submissions</h2>
                <div id="submissions-list" class="space-y-4">
                    <p id="loading-submissions" class="text-center text-gray-500 py-8">Loading submissions...</p>
                </div>
            </section>
            <section id="live-profiles">
                <h2 class="text-2xl font-semibold mb-6 text-gray-800 border-b pb-2">Live Profiles</h2>
                <div id="live-profiles-list" class="space-y-4">
                     <p id="loading-live" class="text-center text-gray-500 py-8">Loading live profiles...</p>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center p-4 hidden modal-backdrop">
        <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
            <h2 id="edit-modal-title" class="text-2xl font-bold mb-4">Edit Profile</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-id" name="id">
                <input type="hidden" id="edit-source" name="source">
                <div class="mb-4">
                    <label for="edit-name" class="block text-sm font-medium text-gray-700">Specialist's Name</label>
                    <input type="text" id="edit-name" name="name" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div class="mb-4">
                    <label for="edit-role" class="block text-sm font-medium text-gray-700">Role / Company</label>
                    <input type="text" id="edit-role" name="role" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div class="mb-4">
                    <label for="edit-contribution" class="block text-sm font-medium text-gray-700">Key Contribution / Focus</label>
                    <textarea id="edit-contribution" name="contribution" rows="3" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>
                <div class="mb-6">
                    <label for="edit-category" class="block text-sm font-medium text-gray-700">Specialty Category</label>
                    <select id="edit-category" name="category" required class="mt-1 block w-full px-3 py-2 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="General SEO">General SEO</option>
                        <option value="Technical SEO">Technical SEO</option>
                        <option value="Content SEO">Content SEO</option>
                        <option value="Local SEO">Local SEO</option>
                        <option value="E-commerce SEO">E-commerce SEO</option>
                        <option value="Link Building">Link Building</option>
                        <option value="AI SEO">AI SEO</option>
                        <option value="Affiliate SEO">Affiliate SEO</option>
                        <option value="Community & Education">Community & Education</option>
                    </select>
                </div>
                <div class="flex justify-end gap-4">
                    <button type="button" id="edit-cancel-btn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300">Cancel</button>
                    <button type="submit" id="edit-save-btn" class="px-4 py-2 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, deleteDoc, updateDoc, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        async function loadConfig() {
            if (window.__APP_CONFIG__) {
                return window.__APP_CONFIG__;
            }

            const candidates = ['config.runtime.json', 'config.json'];
            for (const path of candidates) {
                try {
                    const response = await fetch(path, { cache: 'no-store' });
                    if (response.ok) return response.json();
                } catch (error) {
                    console.warn(`Config fetch failed for ${path}`, error);
                }
            }

            throw new Error('Runtime configuration is missing. Provide config.runtime.json or window.__APP_CONFIG__.');
        }

        const configResult = await loadConfig().catch((error) => {
            console.error(error);
            const errorEl = document.getElementById('login-error');
            if (errorEl) {
                errorEl.textContent = 'Admin app misconfigured: runtime Firebase settings missing.';
            }
            return null;
        });

        if (!configResult) {
            throw new Error('Missing runtime configuration');
        }

        const { firebase: firebaseConfig } = configResult;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        // setLogLevel('debug');

        const pendingCollectionPath = `/artifacts/${firebaseConfig.appId}/public/data/pending-specialists`;
        const approvedCollectionPath = `/artifacts/${firebaseConfig.appId}/public/data/approved-specialists`;
        
        const loginScreen = document.getElementById('login-screen');
        const adminContent = document.getElementById('admin-content');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const editModal = document.getElementById('edit-modal');
        const editForm = document.getElementById('edit-form');
        const editCancelBtn = document.getElementById('edit-cancel-btn');

        let currentSubmissions = [];
        let liveProfiles = [];

        onAuthStateChanged(auth, user => {
            if (user) {
                loginScreen.classList.add('hidden');
                adminContent.classList.remove('hidden');
                loadAdminData();
            } else {
                loginScreen.classList.remove('hidden');
                adminContent.classList.add('hidden');
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-address').value;
            const password = document.getElementById('password').value;
            loginError.textContent = '';
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                console.error("Login Error:", error);
                loginError.textContent = 'Failed to sign in. Please check your email and password.';
            }
        });

        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("Logout Error:", error);
            }
        });

        function loadAdminData() {
            const pendingRef = collection(db, pendingCollectionPath);
            onSnapshot(pendingRef, (snapshot) => {
                currentSubmissions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderSubmissions(currentSubmissions);
            });

            const approvedRef = collection(db, approvedCollectionPath);
            onSnapshot(approvedRef, (snapshot) => {
                liveProfiles = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderLiveProfiles(liveProfiles);
            });
        }

        function renderSubmissions(submissions) {
            const listContainer = document.getElementById('submissions-list');
            listContainer.innerHTML = ''; 
            if (submissions.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-gray-500 py-8">No pending submissions.</p>`;
            } else {
                submissions.forEach(sub => {
                    const card = createCard(sub, 'pending');
                    listContainer.appendChild(card);
                });
            }
            addCardEventListeners();
        }

        function renderLiveProfiles(profiles) {
            const listContainer = document.getElementById('live-profiles-list');
            listContainer.innerHTML = '';
            if (profiles.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-gray-500 py-8">No live profiles.</p>`;
            } else {
                profiles.forEach(profile => {
                    const card = createCard(profile, 'live');
                    listContainer.appendChild(card);
                });
            }
            addCardEventListeners();
        }

        function createCard(data, type) {
            const card = document.createElement('div');
            card.className = 'bg-white p-4 rounded-lg shadow-md border border-gray-200';
            
            let buttonsHtml = '';
            if (type === 'pending') {
                buttonsHtml = `
                    <button data-id="${data.id}" class="reject-btn px-3 py-1 bg-red-600 text-white text-sm font-semibold rounded-md hover:bg-red-700">Reject</button>
                    <button data-id="${data.id}" class="edit-btn px-3 py-1 bg-blue-600 text-white text-sm font-semibold rounded-md hover:bg-blue-700">Edit</button>
                    <button data-id="${data.id}" class="approve-btn px-3 py-1 bg-green-600 text-white text-sm font-semibold rounded-md hover:bg-green-700">Approve</button>
                `;
            } else { // live
                buttonsHtml = `
                    <button data-id="${data.id}" class="delete-live-btn px-3 py-1 bg-red-600 text-white text-sm font-semibold rounded-md hover:bg-red-700">Delete</button>
                    <button data-id="${data.id}" class="edit-live-btn px-3 py-1 bg-blue-600 text-white text-sm font-semibold rounded-md hover:bg-blue-700">Edit</button>
                `;
            }

            card.innerHTML = `
                <h3 class="text-lg font-semibold text-gray-900">${data.name}</h3>
                <p class="text-indigo-600 font-medium text-sm mt-1 mb-2">${data.role}</p>
                <p class="text-gray-500 text-xs mb-3">${data.contribution}</p>
                <div class="flex items-center justify-between">
                     <span class="inline-block bg-gray-200 text-gray-800 text-xs font-semibold mr-2 px-2 py-0.5 rounded-full">${data.category}</span>
                     <div class="flex gap-2">
                        ${buttonsHtml}
                     </div>
                </div>
            `;
            return card;
        }

        function addCardEventListeners() {
            document.querySelectorAll('.approve-btn').forEach(btn => btn.addEventListener('click', () => {
                const id = btn.dataset.id;
                const submissionData = currentSubmissions.find(s => s.id === id);
                const { name, role, contribution, category } = submissionData;
                approveData(id, { name, role, contribution, category });
            }));
            document.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', () => rejectSubmission(btn.dataset.id)));
            document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.id, 'pending')));
            document.querySelectorAll('.edit-live-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.id, 'live')));
            document.querySelectorAll('.delete-live-btn').forEach(btn => btn.addEventListener('click', () => deleteLiveProfile(btn.dataset.id)));
        }

        async function approveData(idToDelete, dataToApprove) {
            try {
                await addDoc(collection(db, approvedCollectionPath), dataToApprove);
                await deleteDoc(doc(db, pendingCollectionPath, idToDelete));
            } catch (error) {
                console.error("Error approving data: ", error);
            }
        }

        async function rejectSubmission(id) {
            try {
                await deleteDoc(doc(db, pendingCollectionPath, id));
            } catch (error) { console.error("Error rejecting submission: ", error); }
        }

        async function deleteLiveProfile(id) {
            if (confirm('Are you sure you want to permanently delete this live profile?')) {
                try {
                    await deleteDoc(doc(db, approvedCollectionPath, id));
                } catch (error) { console.error("Error deleting live profile: ", error); }
            }
        }

        function openEditModal(id, source) {
            const data = source === 'pending' ? currentSubmissions.find(s => s.id === id) : liveProfiles.find(p => p.id === id);
            if (!data) return;

            document.getElementById('edit-id').value = data.id;
            document.getElementById('edit-source').value = source;
            document.getElementById('edit-name').value = data.name;
            document.getElementById('edit-role').value = data.role;
            document.getElementById('edit-contribution').value = data.contribution;
            document.getElementById('edit-category').value = data.category;
            
            document.getElementById('edit-modal-title').textContent = source === 'pending' ? 'Edit & Approve Submission' : 'Edit Live Profile';
            document.getElementById('edit-save-btn').textContent = source === 'pending' ? 'Save & Approve' : 'Save Changes';
            
            editModal.classList.remove('hidden');
        }

        function closeEditModal() {
            editModal.classList.add('hidden');
            editForm.reset();
        }

        editCancelBtn.addEventListener('click', closeEditModal);
        editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditModal(); });

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const source = document.getElementById('edit-source').value;
            const updatedData = {
                name: document.getElementById('edit-name').value,
                role: document.getElementById('edit-role').value,
                contribution: document.getElementById('edit-contribution').value,
                category: document.getElementById('edit-category').value,
            };

            if (source === 'pending') {
                await approveData(id, updatedData);
            } else { // live
                try {
                    const docRef = doc(db, approvedCollectionPath, id);
                    await updateDoc(docRef, updatedData);
                } catch (error) { console.error("Error updating live profile: ", error); }
            }
            closeEditModal();
        });
    </script>
</body>
</html>
